services:
  conduit:
    image: matrixconduit/matrix-conduit:latest
    restart: unless-stopped
    env_file: .env
    environment:
      CONDUIT_CONFIG: /etc/conduit.toml
      CONDUIT_TURN_SECRET: ${TURN_SHARED_SECRET}
    volumes:
      - ./conduit/conduit.toml:/etc/conduit.toml:ro
      - ./data/conduit:/var/lib/matrix-conduit
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  livekit:
    image: livekit/livekit-server:latest
    restart: unless-stopped
    env_file: .env
    environment:
      LIVEKIT_CONFIG: |
        port: 7880
        log_level: info

        rtc:
          tcp_port: 7881
          port_range_start: 49160
          port_range_end: 49200
          use_external_ip: true

          stun_servers:
            - stun.l.google.com:19302

          turn_servers:
            - host: ${TURN_HOST}
              port: 3478
              protocol: udp
              username: ${LIVEKIT_TURN_USER}
              credential: ${LIVEKIT_TURN_PASS}
            - host: ${TURN_HOST}
              port: 3478
              protocol: tcp
              username: ${LIVEKIT_TURN_USER}
              credential: ${LIVEKIT_TURN_PASS}
            - host: ${TURN_HOST}
              port: 5349
              protocol: tls
              username: ${LIVEKIT_TURN_USER}
              credential: ${LIVEKIT_TURN_PASS}

        keys:
          ${LIVEKIT_API_KEY}: ${LIVEKIT_API_SECRET}
    ports:
      - "7881:7881/tcp"
      - "7881:7881/udp"
      - "49160-49200:49160-49200/udp"
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  lk-jwt:
    image: ghcr.io/element-hq/lk-jwt-service:0.3.0
    restart: unless-stopped
    env_file: .env
    environment:
      LIVEKIT_JWT_PORT: ${LIVEKIT_JWT_PORT}
      LIVEKIT_URL: ${LIVEKIT_URL}
      LIVEKIT_KEY: ${LIVEKIT_API_KEY}
      LIVEKIT_SECRET: ${LIVEKIT_API_SECRET}
      LIVEKIT_FULL_ACCESS_HOMESERVERS: ${SERVER_NAME}
      LIVEKIT_LOCAL_HOMESERVERS: ${SERVER_NAME}
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  element-call:
    image: ghcr.io/element-hq/element-call:v0.14.1
    restart: unless-stopped
    volumes:
      - ./element-call/config.json:/usr/share/nginx/html/config.json:ro
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  caddy:
    image: caddy:2
    depends_on:
      - conduit
      - livekit
      - lk-jwt
      - element-call
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./element-call/config.json:/srv/call/config.json:ro
      - ./caddy/Caddyfile:/etc/caddy/Caddyfile:ro
      - ./well-known:/srv/well-known:ro
      - caddy_data:/data
      - caddy_config:/config
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
    networks:
    - default
    - proxy

  coturn:
    image: instrumentisto/coturn
    restart: unless-stopped
    network_mode: "host"
    user: "0:0"
    env_file: .env
    volumes:
      - ./coturn/turnserver.conf:/etc/turnserver.conf:ro
      - /etc/letsencrypt:/etc/letsencrypt:ro
    command:
      - turnserver
      - -c
      - /etc/turnserver.conf
      - --static-auth-secret=${TURN_SHARED_SECRET}
      - -v
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  turn-config:
    build: ./turn-config
    restart: unless-stopped
    env_file: .env
    environment:
      PORT: 3000
      BASE_URL: https://${SERVER_NAME}
      HOMESERVER: ${SERVER_NAME}
      JWT_SERVICE_URL: https://sfu.${SERVER_NAME}/sfu/get
      LIVEKIT_SERVICE_URL: ${LIVEKIT_URL}
      TURN_HOST: ${TURN_HOST}
      TURN_REALM: ${TURN_REALM}
      TURN_TTL: ${TURN_TTL}
      TURN_NAME: elementcall
      TURN_SECRET: ${TURN_SHARED_SECRET}
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

volumes:
  caddy_data:
  caddy_config:

networks:
  proxy:
    external: true
